<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Минималистичный Кликер (Local)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            touch-action: manipulation;
            background-color: #f1f5f9;
            color: #334155;
            font-family: ui-sans-serif, system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
            overflow: hidden;
        }

        /* Адаптивный контейнер для десктопа */
        .game-layout {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            max-width: 1200px;
        }

        @media (min-width: 1024px) {
            .game-layout {
                flex-direction: row;
                align-items: stretch;
                padding: 40px;
                gap: 40px;
            }
            .click-section {
                flex: 1.5;
                justify-content: center;
            }
            .shop-section {
                flex: 1;
                border-radius: 2.5rem !important;
                max-height: 100%;
            }
        }

        .main-circle {
            width: 220px;
            height: 220px;
            background-color: #ffffff;
            border: 8px solid #1e293b;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.1s ease-out, box-shadow 0.1s ease-out;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            user-select: none;
            position: relative;
        }

        @media (min-width: 1024px) {
            .main-circle {
                width: 300px;
                height: 300px;
            }
        }

        .main-circle:active {
            transform: scale(0.92);
            box-shadow: 0 5px 10px -5px rgba(0, 0, 0, 0.1);
        }

        .upgrade-card {
            background-color: #ffffff;
            border: 1px solid #e2e8f0;
            transition: all 0.2s ease;
        }

        .upgrade-card:hover:not(.disabled) {
            border-color: #cbd5e1;
            background-color: #f8fafc;
        }

        .upgrade-card:active:not(.disabled) {
            transform: scale(0.98);
        }

        .disabled {
            opacity: 0.5;
            cursor: not-allowed;
            filter: grayscale(1);
        }

        .floating-text {
            position: absolute;
            pointer-events: none;
            color: #1e293b;
            font-weight: bold;
            animation: floatUp 1s ease-out forwards;
            z-index: 50;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-100px); }
        }

        #save-status {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        /* Скрытие скроллбара */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>

    <div class="game-layout">
        <!-- Секция клика -->
        <div class="click-section flex flex-col items-center">
            <!-- Шапка со счетом -->
            <div class="w-full px-6 pt-10 pb-6 flex flex-col items-center">
                <h1 class="text-5xl lg:text-7xl font-black text-slate-800 tracking-tighter" id="score">0</h1>
                <p class="text-slate-500 font-medium text-sm mt-2 uppercase tracking-widest">Очков накоплено</p>
                <div class="mt-3 text-slate-400" id="save-status">Локальное хранение</div>
            </div>

            <!-- Основная зона клика -->
            <div class="flex-1 flex items-center justify-center w-full py-8">
                <div class="main-circle" id="clicker"></div>
            </div>
        </div>

        <!-- Панель улучшений -->
        <div class="shop-section w-full max-w-md mx-auto bg-white border-t lg:border border-slate-200 p-8 shadow-2xl rounded-t-[2.5rem] flex flex-col">
            <div class="flex justify-between items-end mb-6 shrink-0">
                <div>
                    <h2 class="text-xl font-bold text-slate-800">Магазин</h2>
                    <p class="text-xs text-slate-500 mt-1">Авто: <span id="aps" class="font-bold">0</span>/сек | Клик: +<span id="cpc" class="font-bold">1</span></p>
                </div>
                <button onclick="resetGame()" class="text-[10px] text-red-400 border border-red-100 px-3 py-1.5 rounded-full hover:bg-red-50 transition-colors uppercase font-bold tracking-wider">СБРОС</button>
            </div>

            <div class="space-y-4 overflow-y-auto flex-1 pr-2 scrollbar-hide pb-4">
                <!-- Улучшение клика -->
                <button class="upgrade-card w-full p-5 rounded-2xl flex justify-between items-center text-left shadow-sm" id="upg-click">
                    <div>
                        <div class="font-bold text-slate-800 text-lg">Сила клика</div>
                        <div class="text-xs text-slate-500 mt-0.5" id="upg-click-desc">Lvl 1 • +1 за нажатие</div>
                    </div>
                    <div class="text-right">
                        <div class="font-mono font-black text-blue-600 text-lg" id="upg-click-cost">10</div>
                    </div>
                </button>

                <!-- Авто-клик -->
                <button class="upgrade-card w-full p-5 rounded-2xl flex justify-between items-center text-left shadow-sm" id="upg-auto">
                    <div>
                        <div class="font-bold text-slate-800 text-lg">Авто-майнер</div>
                        <div class="text-xs text-slate-500 mt-0.5" id="upg-auto-desc">Lvl 0 • +1/сек</div>
                    </div>
                    <div class="text-right">
                        <div class="font-mono font-black text-blue-600 text-lg" id="upg-auto-cost">50</div>
                    </div>
                </button>

                <!-- Супер-завод -->
                <button class="upgrade-card w-full p-5 rounded-2xl flex justify-between items-center text-left shadow-sm" id="upg-factory">
                    <div>
                        <div class="font-bold text-slate-800 text-lg">Завод</div>
                        <div class="text-xs text-slate-500 mt-0.5" id="upg-factory-desc">Lvl 0 • +10/сек</div>
                    </div>
                    <div class="text-right">
                        <div class="font-mono font-black text-blue-600 text-lg" id="upg-factory-cost">500</div>
                    </div>
                </button>
                
                <!-- Новое улучшение: Банк -->
                <button class="upgrade-card w-full p-5 rounded-2xl flex justify-between items-center text-left shadow-sm" id="upg-bank">
                    <div>
                        <div class="font-bold text-slate-800 text-lg">Инвестиции</div>
                        <div class="text-xs text-slate-500 mt-0.5" id="upg-bank-desc">Lvl 0 • +50/сек</div>
                    </div>
                    <div class="text-right">
                        <div class="font-mono font-black text-blue-600 text-lg" id="upg-bank-cost">2500</div>
                    </div>
                </button>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'minimal_clicker_save';

        const initialState = {
            score: 0,
            clickPower: 1,
            autoPower: 0,
            upgrades: {
                click: { lvl: 1, cost: 10 },
                auto: { lvl: 0, cost: 50 },
                factory: { lvl: 0, cost: 500 },
                bank: { lvl: 0, cost: 2500 }
            }
        };

        let state = JSON.parse(JSON.stringify(initialState));

        const scoreEl = document.getElementById('score');
        const apsEl = document.getElementById('aps');
        const cpcEl = document.getElementById('cpc');
        const clicker = document.getElementById('clicker');
        const saveStatusEl = document.getElementById('save-status');

        const upgClickBtn = document.getElementById('upg-click');
        const upgAutoBtn = document.getElementById('upg-auto');
        const upgFactoryBtn = document.getElementById('upg-factory');
        const upgBankBtn = document.getElementById('upg-bank');

        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    // Мерджим с начальным состоянием на случай добавления новых апгрейдов
                    state = { 
                        ...initialState, 
                        ...parsed,
                        upgrades: { ...initialState.upgrades, ...parsed.upgrades }
                    };
                } catch (e) {
                    console.error("Save parse error", e);
                }
            }
            updateUI();
        }

        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
            saveStatusEl.innerText = "Сохранено";
            setTimeout(() => {
                saveStatusEl.innerText = "В браузере";
            }, 800);
        }

        function resetGame() {
            if (confirm("Точно сбросить весь прогресс?")) {
                state = JSON.parse(JSON.stringify(initialState));
                saveData();
                updateUI();
            }
        }

        function updateUI() {
            scoreEl.innerText = Math.floor(state.score).toLocaleString('ru-RU');
            apsEl.innerText = state.autoPower;
            cpcEl.innerText = state.clickPower;

            updateUpgradeButton('upg-click', state.upgrades.click, `+${state.upgrades.click.lvl + 1} за клик`);
            updateUpgradeButton('upg-auto', state.upgrades.auto, `+1/сек`);
            updateUpgradeButton('upg-factory', state.upgrades.factory, `+10/сек`);
            updateUpgradeButton('upg-bank', state.upgrades.bank, `+50/сек`);
        }

        function updateUpgradeButton(id, data, nextText) {
            const btn = document.getElementById(id);
            if (!btn) return;
            const costEl = document.getElementById(`${id}-cost`);
            const descEl = document.getElementById(`${id}-desc`);
            
            costEl.innerText = Math.floor(data.cost).toLocaleString('ru-RU');
            descEl.innerText = `Lvl ${data.lvl} • ${nextText}`;
            
            if (state.score >= data.cost) {
                btn.classList.remove('disabled');
            } else {
                btn.classList.add('disabled');
            }
        }

        function doClick(e) {
            state.score += state.clickPower;
            createFloatingText(e);
            updateUI();
        }

        function createFloatingText(e) {
            let x, y;
            if (e.type === 'touchstart') {
                x = e.touches[0].clientX;
                y = e.touches[0].clientY;
            } else {
                x = e.clientX;
                y = e.clientY;
            }

            const div = document.createElement('div');
            div.className = 'floating-text';
            div.innerText = `+${state.clickPower}`;
            div.style.left = `${x}px`;
            div.style.top = `${y}px`;
            document.body.appendChild(div);
            
            setTimeout(() => div.remove(), 1000);
        }

        function buyUpgrade(type) {
            const upg = state.upgrades[type];
            if (state.score >= upg.cost) {
                state.score -= upg.cost;
                upg.lvl++;
                
                if (type === 'click') {
                    state.clickPower += 1;
                } else if (type === 'auto') {
                    state.autoPower += 1;
                } else if (type === 'factory') {
                    state.autoPower += 10;
                } else if (type === 'bank') {
                    state.autoPower += 50;
                }
                
                upg.cost = Math.floor(upg.cost * 1.5);
                updateUI();
                saveData();
            }
        }

        // Игровой цикл (доход)
        setInterval(() => {
            if (state.autoPower > 0) {
                state.score += state.autoPower / 10;
                updateUI();
            }
        }, 100);

        // Ускоренное автосохранение - каждую секунду
        setInterval(saveData, 1000);

        clicker.addEventListener('touchstart', (e) => { e.preventDefault(); doClick(e); });
        clicker.addEventListener('mousedown', doClick);

        upgClickBtn.addEventListener('click', () => buyUpgrade('click'));
        upgAutoBtn.addEventListener('click', () => buyUpgrade('auto'));
        upgFactoryBtn.addEventListener('click', () => buyUpgrade('factory'));
        upgBankBtn.addEventListener('click', () => buyUpgrade('bank'));

        loadData();
    </script>
</body>
</html>
