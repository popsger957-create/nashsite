<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minimal Runner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            touch-action: none;
            background-color: #f1f5f9;
            color: #334155;
            font-family: ui-sans-serif, system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            height: 300px;
            background-color: #ffffff;
            border-bottom: 4px solid #1e293b;
            overflow: hidden;
            cursor: pointer;
        }

        .score-board {
            position: absolute;
            top: 20px;
            right: 25px;
            text-align: right;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-weight: 800;
            z-index: 20;
            pointer-events: none;
        }

        #game-over {
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 30;
            backdrop-filter: blur(8px);
        }

        #player {
            position: absolute;
            bottom: 4px; 
            left: 50px;
            width: 40px;
            height: 40px;
            background-color: #1e293b;
            border-radius: 6px;
            transform-origin: center center;
            will-change: transform;
        }

        .obstacle {
            position: absolute;
            bottom: 0;
            background-color: #ef4444;
            border-radius: 4px;
        }

        .ground-line {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 4px;
            background-color: #1e293b;
        }

        #restart-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="score-board">
            <div class="text-slate-300 text-[10px] uppercase tracking-widest">Best</div>
            <div class="text-slate-400 text-xs mb-1" id="best-score">0</div>
            <div class="text-3xl text-slate-800 leading-none" id="current-score">0</div>
        </div>

        <div id="player"></div>
        <div class="ground-line"></div>

        <div id="game-over">
            <div class="mb-8 text-center">
                <div class="text-slate-300 text-xs uppercase tracking-[0.3em] mb-2">Final Score</div>
                <div class="text-6xl font-black text-slate-800" id="final-score-display">0</div>
            </div>
            <button id="restart-btn" class="bg-slate-800 text-white px-14 py-4 rounded-full font-bold hover:bg-slate-700 active:scale-90 shadow-2xl text-sm uppercase tracking-widest">
                Начать
            </button>
        </div>
    </div>

    <script>
        const container = document.getElementById('game-container');
        const player = document.getElementById('player');
        const scoreEl = document.getElementById('current-score');
        const bestEl = document.getElementById('best-score');
        const gameOverEl = document.getElementById('game-over');
        const restartBtn = document.getElementById('restart-btn');
        const finalScoreDisplay = document.getElementById('final-score-display');

        let isJumping = false;
        let isGameOver = true;
        let score = 0;
        let bestScore = localStorage.getItem('runner_best') || 0;
        let gameSpeed = 7;
        let obstacleTimer;
        let animationFrame;

        // Физика
        let position = 0;
        let gravity = 0.9; 
        let velocity = 0;
        let jumpForce = 16.5; 
        let rotation = 0;

        bestEl.innerText = bestScore;

        function handleInput(e) {
            if (e.target === restartBtn) return;
            if (e.code === 'Space') e.preventDefault();
            
            if (e.code === 'Space' || e.type === 'mousedown' || e.type === 'touchstart') {
                if (isGameOver) return;
                jump();
            }
        }

        function jump() {
            if (!isJumping) {
                isJumping = true;
                velocity = jumpForce;
            }
        }

        function startGame() {
            isGameOver = false;
            score = 0;
            gameSpeed = 7; 
            position = 0;
            velocity = 0;
            rotation = 0;
            isJumping = false;
            
            scoreEl.innerText = "0";
            gameOverEl.style.display = 'none';
            player.style.transform = `translateY(0px) rotate(0deg)`;
            
            document.querySelectorAll('.obstacle').forEach(obs => obs.remove());

            cancelAnimationFrame(animationFrame);
            clearTimeout(obstacleTimer);
            
            requestAnimationFrame(update);
            spawnObstacle();
        }

        function update() {
            if (isGameOver) return;

            if (isJumping) {
                position += velocity;
                velocity -= gravity;
                rotation += 7; 
                
                if (position <= 0) {
                    position = 0;
                    isJumping = false;
                    velocity = 0;
                    rotation = Math.round(rotation / 90) * 90;
                }
            }
            
            player.style.transform = `translateY(-${position}px) rotate(${rotation}deg)`;

            const obstacles = document.querySelectorAll('.obstacle');
            obstacles.forEach(obs => {
                let x = parseFloat(obs.style.left);
                x -= gameSpeed;
                obs.style.left = x + 'px';

                if (x < -50) {
                    obs.remove();
                    score++;
                    scoreEl.innerText = score;
                    if (score % 5 === 0) gameSpeed += 0.25;
                }

                if (x > 50 && x < 80) {
                    if (position < parseInt(obs.style.height) - 4) {
                        endGame();
                    }
                }
            });

            animationFrame = requestAnimationFrame(update);
        }

        function spawnObstacle() {
            if (isGameOver) return;

            const obs = document.createElement('div');
            obs.classList.add('obstacle');
            const height = Math.floor(Math.random() * 30) + 40;
            obs.style.height = height + 'px';
            obs.style.width = '25px';
            obs.style.left = container.offsetWidth + 'px';

            container.appendChild(obs);

            const nextSpawn = Math.floor(Math.random() * 700) + (1100 / (gameSpeed/5));
            obstacleTimer = setTimeout(spawnObstacle, nextSpawn);
        }

        function endGame() {
            isGameOver = true;
            cancelAnimationFrame(animationFrame);
            clearTimeout(obstacleTimer);
            
            finalScoreDisplay.innerText = score;
            gameOverEl.style.display = 'flex';

            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('runner_best', bestScore);
                bestEl.innerText = bestScore;
            }
        }

        window.addEventListener('keydown', handleInput);
        container.addEventListener('mousedown', handleInput);
        container.addEventListener('touchstart', (e) => {
            if (!isGameOver) e.preventDefault();
            handleInput(e);
        }, { passive: false });

        restartBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            startGame();
        });

        // Инициализация
        gameOverEl.style.display = 'flex';
        finalScoreDisplay.innerText = "0";
    </script>
</body>
</html>
